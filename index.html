<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Σύλλογος Εργαζομένων — Αρχειοθέτηση</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:    #1a1410;
      --paper:  #f5f0e8;
      --cream:  #ede8dc;
      --rust:   #8b3a2a;
      --gold:   #c9a84c;
      --muted:  #7a7060;
      --border: #d0c8b8;
    }
    body { font-family: 'Source Serif 4', Georgia, serif; background: var(--paper); color: var(--ink); min-height: 100vh; position: relative; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }
    header {
      position: relative; z-index: 1;
      background: var(--ink); color: var(--paper);
      text-align: center; padding: 2.8rem 1.5rem 2.2rem;
      border-bottom: 4px solid var(--gold);
    }
    .masthead-rule { width: 60px; height: 2px; background: var(--gold); margin: 0 auto 1.1rem; }
    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.7rem, 5vw, 3rem); font-weight: 900;
      letter-spacing: 0.02em; line-height: 1.15;
    }
    header h1 span { color: var(--gold); }
    header p.subtitle { margin-top: 0.7rem; font-size: 0.9rem; font-weight: 300; font-style: italic; color: #c8c0b0; }

    main { position: relative; z-index: 1; max-width: 1000px; margin: 2.5rem auto; padding: 0 1.5rem 4rem; }

    .section-label { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.6rem; }
    .section-label h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }
    .folder-card {
      background: white; border: 1px solid var(--border); border-top: 4px solid var(--rust);
      border-radius: 4px; padding: 1.5rem;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.8rem;
      transition: all 0.25s ease;
      animation: fadeUp 0.4s ease both;
    }
    .folder-card:hover { 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
      border-top-color: var(--gold); 
      transform: translateY(-5px); 
    }
    .f-icon { font-size: 2.5rem; }
    .f-name { font-size: 1rem; font-weight: 600; line-height: 1.3; min-height: 2.6em; display: flex; align-items: center; }
    .f-action { font-size: 0.75rem; color: var(--rust); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; border: 1px solid var(--border); padding: 4px 10px; border-radius: 3px; }
    .folder-card:hover .f-action { background: var(--rust); color: white; border-color: var(--rust); }

    footer {
      position: relative; z-index: 1; border-top: 1px solid var(--border);
      text-align: center; padding: 2rem; font-size: 0.8rem; color: var(--muted);
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<header>
  <div class="masthead-rule"></div>
  <h1>Σύλλογος <span>Εργαζομένων</span></h1>
  <p class="subtitle">Ψηφιακό Αρχείο Εγγράφων</p>
</header>

<main>
  <div class="section-label"><h2>Κατηγορίες Αρχείων</h2></div>
  <div class="grid" id="folderGrid"></div>
</main>

<footer>
  &copy; <span id="yr"></span> Σύλλογος Εργαζομένων · Η διαχείριση αρχείων γίνεται μέσω Google Drive
</footer>

<script>
  /* ΟΔΗΓΙΕΣ: 
     Αντικαταστήστε το "https://..." με το Link Κοινής Χρήσης του κάθε Φακέλου από το Google Drive.
  */
  const FOLDERS = [
    { name: "Αιτήσεις Εγγραφής-Διαγραφής", icon: "📝", link: "https://drive.google.com/drive/folders/1P256yNVUqciE9SePTFQuK-Y6rOuMdB35?usp=drive_link" },
    { name: "Εκδρομές", icon: "🚌", link: "https://drive.google.com/drive/folders/1I1Aa9UEKrtMIxhiI4ISOw77grVcrt9o-?usp=drive_link" },
    { name: "Εκλογικά αποτελέσματα", icon: "🗳️", link: "https://drive.google.com/drive/folders/1Ga2V91HCbm5edFGcuuaGl4MxrQNoAnyS?usp=drive_link" },
    { name: "Ιατρικές Εξετάσεις", icon: "🏥", link: "https://drive.google.com/drive/folders/1M7jLYkQbbZi85UXKKZQTXPwVaKeZekU7?usp=drive_link" },
    { name: "Καταστατικό", icon: "📜", link: "https://drive.google.com/drive/folders/ΤΟ_LINK_ΣΑΣ" },
    { name: "ΜΑΠ", icon: "📋", link: "https://drive.google.com/drive/folders/ΤΟ_LINK_ΣΑΣ" },
    { name: "Νομοθεσία", icon: "⚖️", link: "https://drive.google.com/drive/folders/ΤΟ_LINK_ΣΑΣ" },
    { name: "Ομαδικό Ασφαλιστήριο Υγείας", icon: "🩺", link: "https://drive.google.com/drive/folders/ΤΟ_LINK_ΣΑΣ" },
    { name: "Προσφορές", icon: "🎁", link: "https://drive.google.com/drive/folders/ΤΟ_LINK_ΣΑΣ" },
    { name: "Τροποποιήσεις του Οργανισμού", icon: "🏛️", link: "https://drive.google.com/drive/folders/ΤΟ_LINK_ΣΑΣ" },
    { name: "ΣΕΠΕΘ Εξοδολόγιο Πρότυπο", icon: "📊", link: "https://drive.google.com/drive/folders/ΤΟ_LINK_ΣΑΣ" }
  ];

  const folderGrid = document.getElementById('folderGrid');

  function renderFolders() {
    folderGrid.innerHTML = '';
    FOLDERS.forEach((f, i) => {
      const card = document.createElement('div');
      card.className = 'folder-card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `
        <div class="f-icon">${f.icon}</div>
        <div class="f-name">${f.name}</div>
        <div class="f-action">Άνοιγμα Φακέλου ↗</div>
      `;
      card.addEventListener('click', () => {
        window.open(f.link, '_blank');
      });
      folderGrid.appendChild(card);
    });
  }

  document.getElementById('yr').textContent = new Date().getFullYear();
  renderFolders();
</script>

</body>
</html>
