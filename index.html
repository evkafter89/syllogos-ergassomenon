<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Σύλλογος Εργαζομένων — Ψηφιακό Αρχείο</title>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:    #1a1410;
      --paper:  #fdfcf9;
      --cream:  #f2ece0;
      --rust:   #8b3a2a;
      --gold:   #c9a84c;
      --muted:  #7a7060;
      --border: #e0d8c8;
    }
    body { font-family: 'Noto Serif', Georgia, serif; background: var(--paper); color: var(--ink); min-height: 100vh; position: relative; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }
    
   header {
      position: relative; z-index: 1;
      background: var(--ink); color: var(--paper);
      text-align: center; padding: 3rem 1.5rem 2.5rem;
      border-bottom: 5px solid var(--gold);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    /* CSS για την εικόνα argo.png πάνω αριστερά */
    .header-logo-image {
      position: absolute;
      top: 1rem;
      left: 1.5rem;
      height: 90px; /* Ρυθμίστε το ύψος ανάλογα με το πώς φαίνεται */
      width: auto;
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); /* Διακριτική σκιά για να ξεχωρίζει */
    }

    /* Ρυθμίσεις για κινητά */
    @media (max-width: 768px) {
      .header-logo-image {
        position: static; /* Στα κινητά πάει πάνω από τον τίτλο */
        display: block;
        margin: 0 auto 1rem;
        height: 70px;
      }
      header { padding-top: 1.5rem; }
    }

    .masthead-rule { width: 60px; height: 2px; background: var(--gold); margin: 0 auto 1.2rem; }
    header h1 {
      font-family: 'Marcellus', serif;
      font-size: clamp(1.8rem, 5vw, 3.2rem); font-weight: 400;
      letter-spacing: 0.05em; line-height: 1.2;
    }
    header h1 span { color: var(--gold); }
    header p.subtitle { margin-top: 0.8rem; font-size: 1.1rem; font-weight: 400; font-style: italic; color: #d8d0c0; }

    .search-container { position: relative; z-index: 1; max-width: 600px; margin: -1.5rem auto 2.5rem; padding: 0 1.5rem; }
    #searchInput {
      width: 100%; padding: 1.1rem 1.5rem 1.1rem 3.2rem;
      font-family: inherit; font-size: 1rem;
      border: 1px solid var(--border); border-radius: 30px;
      background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      transition: all 0.2s ease;
    }
    #searchInput:focus { outline: none; border-color: var(--gold); box-shadow: 0 5px 20px rgba(201, 168, 76, 0.2); }
    .search-icon { position: absolute; left: 2.5rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1.2rem; }

    main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 5rem; }
    .section-label { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; }
    .section-label h2 { font-family: 'Marcellus', serif; font-size: 1.6rem; font-weight: 400; color: var(--ink); }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem;
    }
    .folder-card {
      background: white; border: 1px solid var(--border); border-top: 5px solid var(--rust);
      border-radius: 6px; padding: 2.5rem 1.5rem;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 1.2rem;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      animation: fadeUp 0.5s ease both;
    }
    .folder-card:hover { 
      box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
      border-top-color: var(--gold); 
      transform: translateY(-8px); 
    }
    .f-icon { font-size: 3.5rem; transition: transform 0.3s ease; }
    .f-name { font-family: 'Marcellus', serif; font-size: 1.2rem; font-weight: 400; color: var(--ink); line-height: 1.4; min-height: 2.8em; display: flex; align-items: center; }
    .f-action { font-size: 0.8rem; color: var(--rust); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; border: 2px solid var(--border); padding: 8px 18px; border-radius: 20px; }
    .folder-card:hover .f-action { background: var(--rust); color: white; border-color: var(--rust); }

    footer {
      position: relative; z-index: 1; border-top: 1px solid var(--border);
      text-align: center; padding: 3.5rem 1.5rem; font-size: 0.9rem; color: var(--muted); background: var(--cream);
    }
    .footer-content { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.2rem; align-items: center; }
    .contact-btn { display: inline-flex; align-items: center; gap: 0.6rem; padding: 10px 22px; border: 1px solid var(--muted); border-radius: 25px; color: var(--muted); text-decoration: none; font-size: 0.85rem; transition: all 0.2s ease; }
    .contact-btn:hover { background: var(--muted); color: white; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<header>
  <div class="argo-stamp">⛵</div>
  
  <div class="masthead-rule"></div>
  <h1>Σύλλογος <span>Εργαζομένων</span></h1>
  <p class="subtitle">Ψηφιακό Αρχείο Εγγράφων Π.Ε. Μαγνησίας & Σποράδων</p>
</header>

<div class="search-container">
  <span class="search-icon">🔍</span>
  <input type="text" id="searchInput" placeholder="Αναζήτηση κατηγορίας (π.χ. εκλογικά)...">
</div>

<main>
  <div class="section-label"><h2>Κατηγορίες Αρχείων</h2></div>
  <div class="grid" id="folderGrid"></div>
</main>

<footer>
  <div class="footer-content">
    <p>&copy; <span id="yr"></span> Σύλλογος Εργαζομένων Π.Ε. Μαγνησίας · Η διαχείριση αρχείων γίνεται μέσω Google Drive</p>
    <a href="mailto:p.skabouras@thessaly.gov.gr" class="contact-btn">✉ Επικοινωνία με τον Πρόεδρο</a>
  </div>
</footer>

<script>
  const FOLDERS = [
    { name: "Αιτήσεις Εγγραφής-Διαγραφής", icon: "📝", link: "https://drive.google.com/drive/folders/1P256yNVUqciE9SePTFQuK-Y6rOuMdB35?usp=drive_link" },
    { name: "Εκδρομές", icon: "🚌", link: "https://drive.google.com/drive/folders/1I1Aa9UEKrtMIxhiI4ISOw77grVcrt9o-?usp=drive_link" },
    { name: "Εκλογικά αποτελέσματα", icon: "🗳️", link: "https://drive.google.com/drive/folders/1Ga2V91HCbm5edFGcuuaGl4MxrQNoAnyS?usp=drive_link" },
    { name: "Ιατρικές Εξετάσεις", icon: "🏥", link: "https://drive.google.com/drive/folders/1M7jLYkQbbZi85UXKKZQTXPwVaKeZekU7?usp=drive_link" },
    { name: "Καταστατικό", icon: "📜", link: "https://drive.google.com/drive/folders/1Px6of-h6U_F8KcZqtFfJS7frfRfGORx9?usp=drive_link" },
    { name: "ΜΑΠ", icon: "📋", link: "https://drive.google.com/drive/folders/1H8qZXCKKhvi_JrPb2pyYqi1uBYuK0Zgw?usp=drive_link" },
    { name: "Νομοθεσία", icon: "⚖️", link: "https://drive.google.com/drive/folders/1N477kmdRWF1Iq8cveLsTZJk9qL6do_3P?usp=drive_link" },
    { name: "Ομαδικό Ασφαλιστήριο Υγείας", icon: "🩺", link: "https://drive.google.com/drive/folders/1Rj8ZIIXiuwFi-lro3f_x1MuJdGvcawdR?usp=drive_link" },
    { name: "Προσφορές", icon: "🎁", link: "https://drive.google.com/drive/folders/1_gNLyunnV9aeNFx3jZ8AV3DEeN75uOke?usp=drive_link" },
    { name: "Τροποποιήσεις του Οργανισμού", icon: "🏛️", link: "https://drive.google.com/drive/folders/1MuExYuJpOuK9QByuee5sqK2psO052_r4?usp=drive_link" }
  ];

  const folderGrid = document.getElementById('folderGrid');
  const searchInput = document.getElementById('searchInput');

  function renderFolders(filterText = '') {
    folderGrid.innerHTML = '';
    const filteredFolders = FOLDERS.filter(f => f.name.toLowerCase().includes(filterText.toLowerCase()));
    
    filteredFolders.forEach((f, i) => {
      const card = document.createElement('div');
      card.className = 'folder-card';
      card.style.animationDelay = (i * 0.04) + 's';
      card.innerHTML = `
        <div class="f-icon">${f.icon}</div>
        <div class="f-name">${f.name}</div>
        <div class="f-action">Άνοιγμα ↗</div>
      `;
      card.addEventListener('click', () => {
        window.open(f.link, '_blank');
      });
      folderGrid.appendChild(card);
    });
  }

  searchInput.addEventListener('input', (e) => {
    renderFolders(e.target.value);
  });

  document.getElementById('yr').textContent = new Date().getFullYear();
  renderFolders();
</script>

</body>
</html>
