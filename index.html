<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Σύλλογος Εργαζομένων — Ψηφιακό Αρχείο</title>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #1a1410; --paper: #fdfcf9; --gold: #c9a84c; --rust: #8b3a2a; --border: #e0d8c8; --cream: #f2ece0; --muted: #7a7060; }
    body { font-family: 'Noto Serif', serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
    header { position: relative; background: var(--ink); color: var(--paper); text-align: center; padding: 3.5rem 1.5rem 3rem; border-bottom: 5px solid var(--gold); }
    
    /* Η ΕΙΚΟΝΑ ΣΟΥ */
    .header-logo-image { position: absolute; top: 1rem; left: 1.5rem; height: 90px; width: auto; }
    
    .masthead-rule { width: 60px; height: 2px; background: var(--gold); margin: 0 auto 1rem; }
    header h1 { font-family: 'Marcellus', serif; font-size: clamp(1.8rem, 5vw, 3.2rem); letter-spacing: 0.05em; }
    header h1 span { color: var(--gold); }
    header p.subtitle { margin-top: 0.8rem; font-style: italic; color: #d8d0c0; }

    .search-container { position: relative; max-width: 600px; margin: -1.5rem auto 2.5rem; padding: 0 1.5rem; }
    #searchInput { width: 100%; padding: 1rem 3rem; border: 1px solid var(--border); border-radius: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
    
    main { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.8rem; }
    .folder-card { background: white; border: 1px solid var(--border); border-top: 5px solid var(--rust); border-radius: 6px; padding: 2.5rem 1.5rem; cursor: pointer; text-align: center; transition: 0.3s; }
    .folder-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top-color: var(--gold); }
    .f-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .f-name { font-family: 'Marcellus', serif; font-size: 1.2rem; min-height: 2.8em; display: flex; align-items: center; justify-content: center; }

    footer { background: var(--cream); padding: 3rem 1.5rem; text-align: center; font-size: 0.9rem; color: var(--muted); border-top: 1px solid var(--border); }
    .contact-btn { display: inline-block; margin-top: 1rem; padding: 10px 20px; border: 1px solid var(--muted); border-radius: 25px; text-decoration: none; color: var(--muted); }
    
    @media (max-width: 768px) { .header-logo-image { position: static; display: block; margin: 0 auto 1rem; height: 70px; } header { padding-top: 1.5rem; } }
  </style>
</head>
<body>

<header>
  <img src="argo.png" alt="Αργώ" class="header-logo-image">
  <div class="masthead-rule"></div>
  <h1>Σύλλογος <span>Εργαζομένων</span></h1>
  <p class="subtitle">Ψηφιακό Αρχείο Εγγράφων Π.Ε. Μαγνησίας & Σποράδων</p>
</header>

<div class="search-container">
  <input type="text" id="searchInput" placeholder="Αναζήτηση κατηγορίας...">
</div>

<main>
  <div class="grid" id="folderGrid"></div>
</main>

<footer>
  <p>&copy; 2026 Σύλλογος Εργαζομένων Π.Ε. Μαγνησίας</p>
  <a href="mailto:p.skampouras@thessaly.gov.gr" class="contact-btn">✉ Επικοινωνία με τον Πρόεδρο</a>
</footer>

<script>
  const FOLDERS = [
    { name: "Αιτήσεις Εγγραφής-Διαγραφής", icon: "📝", link: "https://drive.google.com/drive/folders/1P256yNVUqciE9SePTFQuK-Y6rOuMdB35?usp=drive_link" },
    { name: "Εκδρομές", icon: "🚌", link: "https://drive.google.com/drive/folders/1I1Aa9UEKrtMIxhiI4ISOw77grVcrt9o-?usp=drive_link" },
    { name: "Εκλογικά αποτελέσματα", icon: "🗳️", link: "https://drive.google.com/drive/folders/1Ga2V91HCbm5edFGcuuaGl4MxrQNoAnyS?usp=drive_link" },
    { name: "Ιατρικές Εξετάσεις", icon: "🏥", link: "https://drive.google.com/drive/folders/1M7jLYkQbbZi85UXKKZQTXPwVaKeZekU7?usp=drive_link" },
    { name: "Καταστατικό", icon: "📜", link: "https://drive.google.com/drive/folders/1Px6of-h6U_F8KcZqtFfJS7frfRfGORx9?usp=drive_link" },
    { name: "ΜΑΠ", icon: "📋", link: "https://drive.google.com/drive/folders/1H8qZXCKKhvi_JrPb2pyYqi1uBYuK0Zgw?usp=drive_link" },
    { name: "Νομοθεσία", icon: "⚖️", link: "https://drive.google.com/drive/folders/1N477kmdRWF1Iq8cveLsTZJk9qL6do_3P?usp=drive_link" },
    { name: "Ομαδικό Ασφαλιστήριο Υγείας", icon: "🩺", link: "https://drive.google.com/drive/folders/1Rj8ZIIXiuwFi-lro3f_x1MuJdGvcawdR?usp=drive_link" },
    { name: "Προσφορές", icon: "🎁", link: "https://drive.google.com/drive/folders/1_gNLyunnV9aeNFx3jZ8AV3DEeN75uOke?usp=drive_link" },
    { name: "Τροποποιήσεις του Οργανισμού", icon: "🏛️", link: "https://drive.google.com/drive/folders/1MuExYuJpOuK9QByuee5sqK2psO052_r4?usp=drive_link" }
  ];

  const folderGrid = document.getElementById('folderGrid');
  const searchInput = document.getElementById('searchInput');

  function renderFolders(filter = '') {
    folderGrid.innerHTML = '';
    FOLDERS.filter(f => f.name.toLowerCase().includes(filter.toLowerCase())).forEach(f => {
      const card = document.createElement('div');
      card.className = 'folder-card';
      card.innerHTML = `<div class="f-icon">${f.icon}</div><div class="f-name">${f.name}</div>`;
      card.onclick = () => window.open(f.link, '_blank');
      folderGrid.appendChild(card);
    });
  }

  searchInput.oninput = (e) => renderFolders(e.target.value);
  renderFolders();
</script>
</body>
</html>
