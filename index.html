<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Σύλλογος Εργαζομένων — Ψηφιακό Αρχείο (Μαγνησία)</title>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:    #1a1410;
      --paper:  #fdfcf9;
      --cream:  #ede8dc;
      --rust:   #8b3a2a;
      --gold:   #c9a84c;
      --muted:  #7a7060;
      --border: #e0d8c8;
    }
    body { font-family: 'Noto Serif', Georgia, serif; background: var(--paper); color: var(--ink); min-height: 100vh; position: relative; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }
    
    /* --- HEADER & LOGO --- */
    header {
      position: relative; z-index: 1;
      background: var(--ink); color: var(--paper);
      text-align: left; /* Αλλαγή σε αριστερή στοίχιση */
      padding: 2.5rem 2rem;
      border-bottom: 5px solid var(--gold);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      display: flex; /* Χρήση flexbox */
      align-items: center; /* Κατακόρυφη ευθυγράμμιση */
      gap: 2rem; /* Κενό ανάμεσα στα στοιχεία */
    }
    
    /* Νέο Λογότυπο (Εικόνα) */
    .magnisia-logo {
      width: 120px; /* Ρύθμιση μεγέθους */
      height: auto;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1); /* Διακριτική σκιά */
    }
    
    .masthead-rule { width: 100%; height: 2px; background: var(--gold); margin: 0 auto; }
    
    .header-text-container { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    header h1 {
      font-family: 'Marcellus', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 400;
      letter-spacing: 0.05em; line-height: 1.2;
    }
    header h1 span { color: var(--gold); }
    header p.subtitle { font-size: 1rem; font-weight: 400; font-style: italic; color: #d8d0c0; letter-spacing: 0.02em; }

    /* --- SEARCH BAR (Αναβαθμισμένη) --- */
    .search-container { position: relative; z-index: 1; max-width: 600px; margin: -1.5rem auto 2.5rem; padding: 0 1.5rem; }
    #searchInput {
      width: 100%; padding: 1.2rem 1.8rem 1.2rem 3.5rem;
      font-family: inherit; font-size: 1rem;
      border: 1px solid var(--border); border-radius: 30px;
      background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    #searchInput:focus { outline: none; border-color: var(--gold); box-shadow: 0 5px 20px rgba(201, 168, 76, 0.3); } /* Χρυσό εφέ focus */
    .search-icon { position: absolute; left: 2.8rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1.2rem; }

    /* --- MAIN CONTENT --- */
    main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 5rem; }
    .section-label { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; padding: 0 0.5rem; }
    .section-label h2 { font-family: 'Marcellus', serif; font-size: 1.8rem; font-weight: 400; color: var(--ink); letter-spacing: 0.03em; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem;
    }
    .folder-card {
      background: white; border: 1px solid var(--border); border-top: 5px solid var(--rust);
      border-radius: 6px; padding: 2.5rem 1.8rem;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 1.2rem;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      animation: fadeUp 0.6s ease both;
    }
    .folder-card:hover { 
      box-shadow: 0 20px 45px rgba(0,0,0,0.15); /* Πιο έντονη σκιά hover */
      border-top-color: var(--gold); 
      transform: translateY(-10px); /* Εφέ "pull" */
    }
    .f-icon { font-size: 3.5rem; transition: transform 0.3s ease; }
    .folder-card:hover .f-icon { transform: scale(1.15); }
    .f-name { font-family: 'Marcellus', serif; font-size: 1.2rem; font-weight: 400; color: var(--ink); line-height: 1.4; min-height: 3em; display: flex; align-items: center; letter-spacing: 0.02em; }
    .f-action { font-size: 0.85rem; color: var(--rust); font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; border: 2px solid var(--border); padding: 8px 18px; border-radius: 20px; transition: all 0.3s ease; }
    .folder-card:hover .f-action { background: var(--rust); color: white; border-color: var(--rust); }

    /* --- FOOTER (Αναβαθμισμένο) --- */
    footer {
      position: relative; z-index: 1; border-top: 1px solid var(--border);
      text-align: center; padding: 3.5rem 2rem; font-size: 0.9rem; color: var(--muted); background: var(--cream);
    }
    .footer-content { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; align-items: center; }
    footer p { line-height: 1.6; color: #6a6050; } /* Πιο έντονο κείμενο footer */
    .contact-btn { display: inline-flex; align-items: center; gap: 0.6rem; padding: 10px 20px; border: 1px solid var(--muted); border-radius: 25px; color: var(--muted); text-decoration: none; font-size: 0.85rem; transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .contact-btn:hover { background: var(--muted); color: white; transform: scale(1.03); } /* Εφέscale hover */

    @keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<header>
  <img src="https://thessaly.gov.gr/wp-content/uploads/2021/07/logo.png" alt="Περιφέρεια Θεσσαλίας" class="magnisia-logo">
  
  <div class="header-text-container">
    <h1>Σύλλογος <span>Εργαζομένων</span></h1>
    <p class="subtitle">Κεντρικό Ψηφιακό Αρχείο Εγγράφων (Π.Ε. Μαγνησίας)</p>
  </div>
</header>

<div class="search-container">
  <span class="search-icon">🔍</span>
  <input type="text" id="searchInput" placeholder="Αναζήτηση κατηγορίας (π.χ. εκδρομές)...">
</div>

<main>
  <div class="section-label"><h2>Κατηγορίες Αρχείων</h2></div>
  <div class="grid" id="folderGrid"></div>
</main>

<footer>
  <div class="footer-content">
    <p>&copy; <span id="yr"></span> Σύλλογος Εργαζομένων Π.Ε. Μαγνησίας · Η διαχείριση αρχείων γίνεται μέσω Google Drive</p>
    <a href="mailto:p.skabouras@thessaly.gov.gr" class="contact-btn">✉ Επικοινωνία με τον Πρόεδρο</a>
  </div>
</footer>

<script>
  const FOLDERS = [
    { name: "Αιτήσεις Εγγραφής-Διαγραφής", icon: "📝", link: "https://drive.google.com/drive/folders/1P256yNVUqciE9SePTFQuK-Y6rOuMdB35?usp=drive_link" },
    { name: "Εκδρομές", icon: "🚌", link: "https://drive.google.com/drive/folders/1I1Aa9UEKrtMIxhiI4ISOw77grVcrt9o-?usp=drive_link" },
    { name: "Εκλογικά αποτελέσματα", icon: "🗳️", link: "https://drive.google.com/drive/folders/1Ga2V91HCbm5edFGcuuaGl4MxrQNoAnyS?usp=drive_link" },
    { name: "Ιατρικές Εξετάσεις", icon: "🏥", link: "https://drive.google.com/drive/folders/1M7jLYkQbbZi85UXKKZQTXPwVaKeZekU7?usp=drive_link" },
    { name: "Καταστατικό", icon: "📜", link: "https://drive.google.com/drive/folders/1Px6of-h6U_F8KcZqtFfJS7frfRfGORx9?usp=drive_link" },
    { name: "ΜΑΠ", icon: "📋", link: "https://drive.google.com/drive/folders/1H8qZXCKKhvi_JrPb2pyYqi1uBYuK0Zgw?usp=drive_link" },
    { name: "Νομοθεσία", icon: "⚖️", link: "https://drive.google.com/drive/folders/1N477kmdRWF1Iq8cveLsTZJk9qL6do_3P?usp=drive_link" },
    { name: "Ομαδικό Ασφαλιστήριο Υγείας", icon: "🩺", link: "https://drive.google.com/drive/folders/1Rj8ZIIXiuwFi-lro3f_x1MuJdGvcawdR?usp=drive_link" },
    { name: "Προσφορές", icon: "🎁", link: "https://drive.google.com/drive/folders/1_gNLyunnV9aeNFx3jZ8AV3DEeN75uOke?usp=drive_link" },
    { name: "Τροποποιήσεις του Οργανισμού", icon: "🏛️", link: "https://drive.google.com/drive/folders/1MuExYuJpOuK9QByuee5sqK2psO052_r4?usp=drive_link" }
  ];

  const folderGrid = document.getElementById('folderGrid');
  const searchInput = document.getElementById('searchInput');

  function renderFolders(filterText = '') {
    folderGrid.innerHTML = '';
    const filteredFolders = FOLDERS.filter(f => f.name.toLowerCase().includes(filterText.toLowerCase()));
    
    filteredFolders.forEach((f, i) => {
      const card = document.createElement('div');
      card.className = 'folder-card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `
        <div class="f-icon">${f.icon}</div>
        <div class="f-name">${f.name}</div>
        <div class="f-action">Άνοιγμα ↗</div>
      `;
      card.addEventListener('click', () => {
        window.open(f.link, '_blank');
      });
      folderGrid.appendChild(card);
    });
  }

  searchInput.addEventListener('input', (e) => {
    renderFolders(e.target.value);
  });

  document.getElementById('yr').textContent = new Date().getFullYear();
  renderFolders();
</script>

</body>
</html>
